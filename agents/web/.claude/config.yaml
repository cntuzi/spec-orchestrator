# Claude Code Project Configuration - Web (Frontend)
# Copy to your Web project's .claude/config.yaml
# Replace all {PLACEHOLDERS} with your actual values.

project:
  name: "{PROJECT_NAME}"
  platform: web
  description: "{PROJECT_DESCRIPTION} Web frontend"

version:
  current: "1.0"

# =============================================================================
# External Repository References (logical IDs)
# Resolved at runtime by resolve-context.sh
# Resolution: env var → symlink → git-worktree-discovery → hint → prompt
# =============================================================================

repos:
  specs:
    hint: ../specs                  # specs repo (symlink or relative path)
  api-doc:
    hint: ../api-doc                # API documentation repo

# =============================================================================
# Task Dependencies
# =============================================================================

dependencies:
  shared:
    - S1    # PRD confirmed
    - S2    # Design reviewed
    - S3    # API defined

# =============================================================================
# Path Templates
# At runtime, {specs} and {api_doc} are resolved from .context-resolved.yaml
# =============================================================================

paths:
  version_config: "{specs}/{version}/config.yaml"
  prd: "{specs}/{version}/prd/"
  design: "{specs}/{version}/figma-index.md"
  i18n: "{specs}/{version}/i18n/strings.md"
  features: "{specs}/{version}/features/"
  context: "{specs}/{version}/context.yaml"
  tasks:
    shared: "{specs}/{version}/tasks/shared.md"
    backend: "{specs}/{version}/tasks/backend.md"
    self: "{specs}/{version}/tasks/{platform}.md"

# =============================================================================
# Local Cache
# =============================================================================

cache:
  figma: ".claude/cache/{version}/figma"
