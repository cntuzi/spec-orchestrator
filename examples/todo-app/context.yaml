sources:

  prd:
    type: local
    description: "Todo App PRD"
    artifacts:
      - prd/README.md

  api_doc:
    type: git-repo
    description: "Todo App backend API (Swagger)"
    repo_id: api-doc
    artifacts:
      - todo_swagger.json
