      last_sync: 2026-01-15T10:00:00Z
      node_count: 12

  platforms:
    ios:
      type: git-repo
      description: "Todo App iOS client"
      repo_id: ios
      pin:
        branch: master
        base_commit: d4e5f6a
    android:
      type: git-repo
      description: "Todo App Android client"
      repo_id: android
      pin:
        branch: master
        base_commit: g7h8i9j

drift_policy: warn
