version: "1.0"
codename: "MVP"

figma:
  file_key: "YOUR_FIGMA_FILE_KEY"
  base_url: "https://www.figma.com/design/YOUR_FIGMA_FILE_KEY"

paths:
  prd: "prd/"
  figma_index: "figma-index.md"
  i18n: "i18n/strings.md"
  features: "features/"
  dashboard: "DASHBOARD.md"
  changelog: "CHANGELOG.md"
  tasks:
    shared: "tasks/shared.md"
    backend: "tasks/backend.md"
    ios: "tasks/ios.md"
    android: "tasks/android.md"

api:
  swagger_files:
    - api-doc/todo_swagger.json

features:
  - id: F01
    name: Task List
    module: tasks
    priority: P0
    ui_weight: heavy
  - id: F02
    name: Create Task
    module: tasks
    priority: P0
    ui_weight: heavy
  - id: F03
    name: Task Detail
    module: tasks
    priority: P1
    ui_weight: light

dependency_index:
  api_to_features:
    /api/tasks: [F01, F02]
    /api/tasks/{id}: [F03]
  feature_to_backend:
    F01: [B01]
    F02: [B01]
    F03: [B02]
